name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

concurrency:
  group: deploy-worker-spexx-cloud-gateway
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Bundle worker
        run: npx wrangler deploy --dry-run --outdir=dist
      - name: Upload worker via API
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # Pull compatibility_date from wrangler.toml (POSIX-grep, not TOML parser)
          COMPAT_DATE=$(grep -E '^compatibility_date' wrangler.toml | sed -E 's/.*"([0-9-]+)".*/\1/')
          SCRIPT_NAME=$(grep -E '^name' wrangler.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Uploading $SCRIPT_NAME (compat=$COMPAT_DATE)"

          RESP=$(curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${SCRIPT_NAME}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -F "metadata={\"main_module\":\"index.js\",\"compatibility_date\":\"${COMPAT_DATE}\"};type=application/json" \
            -F "index.js=@dist/index.js;type=application/javascript+module")

          echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print('success:', d.get('success')); print('errors:', d.get('errors')); sys.exit(0 if d.get('success') else 1)"
